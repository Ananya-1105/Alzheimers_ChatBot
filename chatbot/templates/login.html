<!DOCTYPE html>
<html lang="en" data-theme="midnight-steel">
<head>
  <meta charset="UTF-8">
  <title>NeuroScan AI · Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>

    /* ================================================
       THEME SYSTEM — 5 THEMES (synced across all pages)
    ================================================ */
    [data-theme="midnight-steel"] {
      --bg:#0e0e12; --surface:#16161d; --surface2:#1c1c26; --border:#2a2a3d;
      --accent:#7c6ff7; --accent2:#a89eff; --accent-glow:rgba(124,111,247,0.14);
      --text:#eeeef5; --muted:#6b6b8a; --success:#3dd68c; --warning:#ffb444; --danger:#ff5c72;
      --mild:#ffb444; --moderate:#ff5c72;
    }
    [data-theme="ivory-studio"] {
      --bg:#f5f2ed; --surface:#faf8f4; --surface2:#eeebe4; --border:#ddd8cf;
      --accent:#0d7377; --accent2:#14a8ad; --accent-glow:rgba(13,115,119,0.08);
      --text:#1a1714; --muted:#7a7163; --success:#2d8a5e; --warning:#b06800; --danger:#c0392b;
      --mild:#b06800; --moderate:#c0392b;
    }
    [data-theme="obsidian-rose"] {
      --bg:#0c0809; --surface:#130d0f; --surface2:#1a1012; --border:#2e1c20;
      --accent:#e8956d; --accent2:#f2b48e; --accent-glow:rgba(232,149,109,0.12);
      --text:#f5ede8; --muted:#7a5c5c; --success:#6fcf97; --warning:#f2c94c; --danger:#eb5757;
      --mild:#f2c94c; --moderate:#eb5757;
    }
    [data-theme="nordic-slate"] {
      --bg:#f2f4f8; --surface:#ffffff; --surface2:#edf0f5; --border:#d4d9e6;
      --accent:#3b5bdb; --accent2:#748ffc; --accent-glow:rgba(59,91,219,0.08);
      --text:#1a1f36; --muted:#8792a8; --success:#0ca678; --warning:#f08c00; --danger:#e03131;
      --mild:#f08c00; --moderate:#e03131;
    }
    [data-theme="deep-ocean"] {
      --bg:#040f14; --surface:#071820; --surface2:#0b2030; --border:#0f3248;
      --accent:#00d4aa; --accent2:#4dffd6; --accent-glow:rgba(0,212,170,0.12);
      --text:#e0f7f4; --muted:#3d7a72; --success:#00d4aa; --warning:#ffd166; --danger:#ff6b6b;
      --mild:#ffd166; --moderate:#ff6b6b;
    }
    /* Light theme card polish */
    [data-theme="ivory-studio"] .stat-card,
    [data-theme="ivory-studio"] .section-card,
    [data-theme="ivory-studio"] .chat-card,
    [data-theme="ivory-studio"] .report-card,
    [data-theme="ivory-studio"] .sidebar,
    [data-theme="nordic-slate"]  .stat-card,
    [data-theme="nordic-slate"]  .section-card,
    [data-theme="nordic-slate"]  .chat-card,
    [data-theme="nordic-slate"]  .report-card,
    [data-theme="nordic-slate"]  .sidebar { box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    body { transition: background 0.3s, color 0.3s; }

    [data-theme="midnight-steel"] {
      --bg: #080c14;
      --surface: #0d1421;
      --surface2: #111827;
      --border: #1e2d45;
      --accent: #0ea5e9;
      --accent2: #38bdf8;
      --accent-glow: rgba(14,165,233,0.15);
      --text: #f0f6ff;
      --muted: #64748b;
      --success: #10b981;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(14,165,233,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14,165,233,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }
    .bg-glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(14,165,233,0.08) 0%, transparent 70%);
      top: -200px; left: -200px;
      z-index: 0;
      animation: float 8s ease-in-out infinite;
    }
    .bg-glow2 {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56,189,248,0.06) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      z-index: 0;
      animation: float 10s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, 30px); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      width: 420px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(14,165,233,0.05);
      animation: slideUp 0.5s ease forwards;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      color: white;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .logo-text span { color: var(--accent); }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 2rem;
    }
    .tab {
      flex: 1;
      padding: 0.6rem;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 500;
      border-radius: 7px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
      border: none;
      background: transparent;
    }
    .tab.active {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* Form */
    .form-group { margin-bottom: 1.2rem; }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.85rem;
    }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 0.75rem 0.75rem 2.5rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* Button */
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.85rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
      letter-spacing: 0.02em;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(14,165,233,0.3);
    }
    .btn-primary:active { transform: scale(0.98); }

    /* Flash messages */
    .flash {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1.2rem;
    }
    .flash.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .flash.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }

    /* Divider */
    .divider {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      margin: 1.5rem 0 0;
    }

    /* Panel toggle */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ---- Sidebar Theme Switcher ---- */
    .theme-switcher-sidebar { position: relative; }
    .theme-toggle-sidebar {
      width:100%; display:flex; align-items:center; gap:.6rem;
      padding:.55rem .75rem; border-radius:8px; cursor:pointer;
      border:1px solid var(--border); background:var(--surface2); color:var(--text);
      font-family:'DM Sans',sans-serif; font-size:.82rem; font-weight:500;
      transition:all .2s;
    }
    .theme-toggle-sidebar:hover { border-color:var(--accent); color:var(--accent); }
    .t-dot-s {
      width:9px; height:9px; border-radius:50%; flex-shrink:0;
      background:var(--accent); box-shadow:0 0 6px var(--accent);
      transition:background .3s, box-shadow .3s;
    }
    .theme-dd-sidebar {
      position:absolute; bottom:calc(100% + 6px); left:0; right:0;
      background:var(--surface); border:1px solid var(--border); border-radius:10px;
      padding:.4rem; z-index:999; display:none; flex-direction:column; gap:.15rem;
      box-shadow:0 -16px 40px rgba(0,0,0,.35);
      animation:ddUp .15s cubic-bezier(.34,1.4,.64,1);
    }
    .theme-dd-sidebar.open { display:flex; }
    @keyframes ddUp { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
    .topt {
      display:flex; align-items:center; gap:.55rem;
      padding:.4rem .55rem; border-radius:7px; cursor:pointer;
      border:none; background:transparent; width:100%; text-align:left;
      font-family:'DM Sans',sans-serif; font-size:.78rem; color:var(--text);
      transition:background .12s;
    }
    .topt:hover { background:var(--surface2); }
    .topt.active { background:var(--accent-glow); color:var(--accent); }
    .topt small { display:block; font-size:.65rem; color:var(--muted); margin-top:.02rem; }
    .topt.active small { color:var(--accent2); }
    .tck { margin-left:auto; font-size:.65rem; opacity:0; }
    .topt.active .tck { opacity:1; }
    .tsw {
      width:24px; height:24px; border-radius:6px; flex-shrink:0;
      border:1.5px solid rgba(255,255,255,.08);
    }
    .sw1{background:linear-gradient(135deg,#0e0e12 50%,#7c6ff7);}
    .sw2{background:linear-gradient(135deg,#f5f2ed 50%,#0d7377);}
    .sw3{background:linear-gradient(135deg,#0c0809 50%,#e8956d);}
    .sw4{background:linear-gradient(135deg,#f2f4f8 50%,#3b5bdb);}
    .sw5{background:linear-gradient(135deg,#040f14 50%,#00d4aa);}
    [data-theme="ivory-studio"] .tsw,
    [data-theme="nordic-slate"]  .tsw { border-color:rgba(0,0,0,.12); }

  </style>
</head>
<body>

    <!-- Floating theme button for login -->
    <div style="position:fixed;top:1rem;right:1rem;z-index:999;">
      <div class="theme-switcher-sidebar" style="width:170px;">
        <button class="theme-toggle-sidebar" onclick="toggleThemeDD()" id="themeSideBtn">
          <span class="t-dot-s" id="tDotS"></span>
          <span id="themeLabelS">Theme</span>
          <i class="fas fa-chevron-down" style="font-size:.6rem;margin-left:auto;"></i>
        </button>
        <div class="theme-dd-sidebar" id="themeDD" style="bottom:auto;top:calc(100% + 6px);">
          <button class="topt" data-k="midnight-steel" onclick="setTheme('midnight-steel',this)">
            <span class="tsw sw1"></span><span>Midnight Steel<small>Charcoal · Violet</small></span><i class="fas fa-check tck"></i>
          </button>
          <button class="topt" data-k="ivory-studio" onclick="setTheme('ivory-studio',this)">
            <span class="tsw sw2"></span><span>Ivory Studio<small>Warm White · Teal</small></span><i class="fas fa-check tck"></i>
          </button>
          <button class="topt" data-k="obsidian-rose" onclick="setTheme('obsidian-rose',this)">
            <span class="tsw sw3"></span><span>Obsidian Rose<small>Near-Black · Amber</small></span><i class="fas fa-check tck"></i>
          </button>
          <button class="topt" data-k="nordic-slate" onclick="setTheme('nordic-slate',this)">
            <span class="tsw sw4"></span><span>Nordic Slate<small>Cool White · Indigo</small></span><i class="fas fa-check tck"></i>
          </button>
          <button class="topt" data-k="deep-ocean" onclick="setTheme('deep-ocean',this)">
            <span class="tsw sw5"></span><span>Deep Ocean<small>Dark Teal · Aqua</small></span><i class="fas fa-check tck"></i>
          </button>
        </div>
      </div>
    </div>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon"><i class="fas fa-brain"></i></div>
      <div class="logo-text">Neuro<span>Scan</span> AI</div>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login', this)">Sign In</button>
      <button class="tab" onclick="switchTab('register', this)">Register</button>
    </div>

    <!-- Login Panel -->
    <div id="login" class="panel active">
      <form method="POST" action="/login">
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" placeholder="doctor@hospital.com" required>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn-primary">
          <i class="fas fa-sign-in-alt" style="margin-right:8px"></i> Sign In
        </button>
      </form>
    </div>

    <!-- Register Panel -->
    <div id="register" class="panel">
      <form method="POST" action="/register">
        <div class="form-group">
          <label>Full Name</label>
          <div class="input-wrap">
            <i class="fas fa-user"></i>
            <input type="text" name="name" placeholder="Dr. John Smith" required>
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" placeholder="doctor@hospital.com" required>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Min. 8 characters" required>
          </div>
        </div>
        <button type="submit" class="btn-primary">
          <i class="fas fa-user-plus" style="margin-right:8px"></i> Create Account
        </button>
      </form>
    </div>

    <div class="divider">NeuroScan AI · For Educational Use Only</div>
  </div>

  <script>
    function switchTab(panel, btn) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(panel).classList.add('active');
      btn.classList.add('active');
    }
  </script>

  <script>
    const NS_THEME_COLORS = {
      'midnight-steel':'#7c6ff7','ivory-studio':'#0d7377',
      'obsidian-rose':'#e8956d','nordic-slate':'#3b5bdb','deep-ocean':'#00d4aa'
    };
    const NS_THEME_NAMES = {
      'midnight-steel':'Midnight Steel','ivory-studio':'Ivory Studio',
      'obsidian-rose':'Obsidian Rose','nordic-slate':'Nordic Slate','deep-ocean':'Deep Ocean'
    };
    function setTheme(k, btn) {
      document.documentElement.setAttribute('data-theme', k);
      const dot = document.getElementById('tDotS');
      if(dot){ dot.style.background=NS_THEME_COLORS[k]; dot.style.boxShadow='0 0 7px '+NS_THEME_COLORS[k]; }
      const lbl = document.getElementById('themeLabelS');
      if(lbl) lbl.textContent = NS_THEME_NAMES[k];
      document.querySelectorAll('.topt').forEach(o=>o.classList.remove('active'));
      if(btn) btn.classList.add('active');
      localStorage.setItem('ns-theme', k);
      closeThemeDD();
    }
    function toggleThemeDD(){ document.getElementById('themeDD').classList.toggle('open'); }
    function closeThemeDD(){ const d=document.getElementById('themeDD'); if(d) d.classList.remove('open'); }
    document.addEventListener('click', function(e){
      const sw = document.querySelector('.theme-switcher-sidebar');
      if(sw && !sw.contains(e.target)) closeThemeDD();
    });
    (function(){
      const saved = localStorage.getItem('ns-theme') || 'midnight-steel';
      const btn = document.querySelector('.topt[data-k="'+saved+'"]');
      setTheme(saved, btn);
    })();
  </script>

</body>
</html>
